name: Validate Community Links

on:
  pull_request:
    paths:
      - "community/links.yaml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate links.yaml schema and URLs
        run: |
          bun -e "
          import { readFileSync } from 'fs';
          import { parse } from 'yaml';

          const doc = parse(readFileSync('community/links.yaml', 'utf8'));
          const links = doc.links ?? [];
          const errors: string[] = [];
          const seen = new Set<string>();

          const required = ['title', 'url', 'tags', 'description', 'submittedBy', 'submittedAt'] as const;

          for (let i = 0; i < links.length; i++) {
            const entry = links[i];
            const prefix = 'links[' + i + ']';

            // Check required fields
            for (const field of required) {
              if (!entry[field]) {
                errors.push(prefix + ' is missing required field: ' + field);
              }
            }

            // Check for duplicates
            if (entry.url) {
              if (seen.has(entry.url)) {
                errors.push(prefix + ' has duplicate URL: ' + entry.url);
              }
              seen.add(entry.url);
            }

            // Check tags is an array
            if (entry.tags && !Array.isArray(entry.tags)) {
              errors.push(prefix + '.tags must be an array');
            }
          }

          if (errors.length > 0) {
            console.error('Schema validation errors:');
            for (const e of errors) console.error('  - ' + e);
            process.exit(1);
          }

          console.log('Schema validation passed (' + links.length + ' entries)');

          // Check URLs resolve
          let urlErrors = 0;
          for (let i = 0; i < links.length; i++) {
            const url = links[i].url;
            try {
              const res = await fetch(url, { method: 'HEAD', redirect: 'follow' });
              if (!res.ok) {
                console.error('links[' + i + '] URL returned ' + res.status + ': ' + url);
                urlErrors++;
              } else {
                console.log('links[' + i + '] URL ok: ' + url);
              }
            } catch (err) {
              console.error('links[' + i + '] URL unreachable: ' + url);
              urlErrors++;
            }
          }

          if (urlErrors > 0) {
            console.error(urlErrors + ' URL(s) failed to resolve');
            process.exit(1);
          }

          console.log('All URLs resolve successfully');
          "
